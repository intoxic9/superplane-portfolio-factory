    - id: runnerbash-push-preview-5f50cd
      name: Push Preview
      type: TYPE_ACTION
      component: runnerBash
      configuration:
        environment:
          - name: HTML
            value: '{{ $[''Generate Site''].data.result.text }}'
            valueSource: literal
          - name: REPO_OVERRIDE
            value: '{{ $[''Clean Prompt''].data.result.repo_override }}'
