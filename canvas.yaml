          text: ':alarm_clock: Approval timed out after 10 minutes. The preview is still here if you want it: {{ $[''Push Preview''].data.result.preview_url }} — reply with a fresh `@bot ...` in this thread to try again.'
          thread_ts: '{{ $[''Clean Prompt''].data.result.thread_anchor }}'
        method: POST
