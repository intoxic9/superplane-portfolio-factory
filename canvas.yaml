      name: Approval Gate
      type: TYPE_ACTION
      component: slack.waitForButtonClick
      configuration:
        buttons:
          - name: Approve & Deploy
            value: approve
          - name: Reject
            value: reject
        channel: YOUR_SLACK_CHANNEL_ID
        message: |-
          :eyes: *Portfolio ready for review.*

          • Preview (rendered in browser): {{ $['Push Preview'].data.result.preview_url }}
          • Source branch: `{{ $['Push Preview'].data.result.branch }}` on {{ $['Push Preview'].data.result.repo }}

          *Approve* pushes to `main` and triggers the Render production deploy.
          *Reject* discards this version — you can then reply *in this thread* with refinements (e.g. `@bot make it darker`). The bot remembers everything said in the thread so far.
        timeout: 600
      metadata:
        channel:
          id: YOUR_SLACK_CHANNEL_ID
          name: YOUR_SLACK_CHANNEL_NAME
      position:
        x: 6400
        'y': 1080
      isCollapsed: false
      integration:
