apiVersion: v1
kind: Canvas
metadata:
  id: YOUR_CANVAS_ID
  name: Portfolio Factory
  description: AI portfolio factory v4 — Slack-thread conversational memory. Every mention is added to a per-thread history; gpt-5 sees the full conversation each time, so refinements like "make it darker" naturally combine with prior context. Two memory namespaces — thread_messages for context, portfolios for final deploys.
spec:
  nodes:
    - id: runnerbash-generate-site-4882ea
      name: Generate Site
      type: TYPE_ACTION
      component: runnerBash
      configuration:
        environment:
          - name: OPENROUTER_API_KEY
            secret:
              key: OPENROUTER_API_KEY
              secret: OPENROUTER_API_KEY
            valueSource: secret
          - name: MODEL
            value: openai/gpt-5
            valueSource: literal
          - name: DESCRIPTION
            value: '{{ $[''Build Prompt''].data.result.prompt }}'
            valueSource: literal
        execution_mode: host
        execution_timeout_seconds: 300
        machine_type: e1-tiny-amd64
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          if [[ -z "${DESCRIPTION// /}" ]]; then
            jq -n '{text: "NEED_MORE_INFO: Please describe the portfolio you want — at minimum the person'\''s name and what they do."}' > "$SUPERPLANE_RESULT_FILE"
            exit 0
          fi
          PROMPT=$(cat <<EOF
          You are a senior front-end designer building a personal portfolio website. The user's brief is below — it may be a single message or a multi-message Slack thread including refinements.

          BRIEF:
          ${DESCRIPTION}

          DECISION RULES:
          1. If the brief is too vague to build anything meaningful (no name, no idea what the portfolio is about), output ONLY:
          NEED_MORE_INFO: <specific question naming what's missing>

          2. Otherwise output a complete, self-contained index.html and NOTHING else.

          HTML REQUIREMENTS:
          - All CSS in <style>, all JS in <script>, single file
          - No external files, no frameworks, no build step
          - Use the name, role, projects, contact, design vibe from the brief; sensible defaults for missing pieces
          - When the brief is a multi-turn conversation, the LATER messages override earlier ones when they conflict
          - Fully responsive (mobile single-column, desktop multi-column via grid/flex)
          - Semantic HTML5, accessible contrast, subtle hover transitions, coherent palette, placeholder SVG/emoji
          - Output ONLY the raw HTML starting with <!DOCTYPE html> or <html
          EOF
          )
          PAYLOAD=$(jq -n --arg model "$MODEL" --arg content "$PROMPT" '{model:$model,messages:[{role:"user",content:$content}]}')
          RESPONSE=$(curl -sS --max-time 240 \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://superplane.com" \
            -H "X-Title: Portfolio Factory" \
            -d "$PAYLOAD" \
            https://openrouter.ai/api/v1/chat/completions)
          TEXT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
          if [[ -z "$TEXT" ]]; then
            echo "OpenRouter returned no content: $RESPONSE" >&2
            exit 1
          fi
          jq -n --arg text "$TEXT" '{text: $text}' > "$SUPERPLANE_RESULT_FILE"
      position:
        x: 3840
        'y': 720
      isCollapsed: false
    - id: http-notify-rejected-3d94dc
      name: Notify Rejected
      type: TYPE_ACTION
      component: http
      configuration:
        authorization:
          credential:
            key: SLACK_BOT_TOKEN
            secret: SLACK_BOT_TOKEN
          type: bearer
        contentType: application/json
        json:
          channel: '{{ $[''Clean Prompt''].data.result.channel }}'
          text: |-
            :pencil2: Got it, discarded. Reply *in this thread* with refinements and I'll generate a new version. I remember everything we've discussed — for example:

            > `@bot use a dark monochrome palette, drop the blog section, add a 'Speaking' section with three placeholder talks`

            Or describe a completely different design vibe and I'll start fresh.
          thread_ts: '{{ $[''Clean Prompt''].data.result.thread_anchor }}'
        method: POST
        successCodes: '200'
        timeoutSeconds: 15
        url: https://slack.com/api/chat.postMessage
      position:
        x: 8960
        'y': 900
      isCollapsed: false
    - id: runnerbash-push-to-github-9780ad
      name: Push to GitHub
      type: TYPE_ACTION
      component: runnerBash
      configuration:
        environment:
          - name: HTML
            value: '{{ $[''Generate Site''].data.result.text }}'
            valueSource: literal
          - name: REPO_OVERRIDE
            value: '{{ $[''Clean Prompt''].data.result.repo_override }}'
            valueSource: literal
          - name: DEFAULT_REPO
            value: intoxic9/Superplane_hackathon
            valueSource: literal
          - name: GH_TOKEN
            secret:
              key: GH_TOKEN
              secret: GH_TOKEN
            valueSource: secret
        execution_mode: host
        execution_timeout_seconds: 300
        machine_type: e1-tiny-amd64
        script: |
          #!/usr/bin/env bash
          set -uo pipefail
          REPO_URL=""
          fail() {
            local stage="$1"; shift
            local msg="$*"
            local scrubbed
            scrubbed="$(printf '%s' "$msg" | sed -E 's#x-access-token:[^@]+@#x-access-token:***@#g')"
            jq -n --arg stage "$stage" --arg error "$scrubbed" --arg repo "${REPO_URL:-unknown}" \
              '{error:$error,stage:$stage,repo:$repo}' > "$SUPERPLANE_RESULT_FILE" 2>/dev/null || \
              printf '{"error":"%s","stage":"%s"}' "$scrubbed" "$stage" > "$SUPERPLANE_RESULT_FILE"
            exit 1
          }
          if [[ -n "${REPO_OVERRIDE// /}" ]]; then REPO_INPUT="$REPO_OVERRIDE"; else REPO_INPUT="$DEFAULT_REPO"; fi
          REPO_URL="${REPO_INPUT%.git}"; REPO_URL="${REPO_URL%/}"
          if [[ "$REPO_URL" != https://* ]]; then REPO_URL="https://github.com/${REPO_URL}"; fi
          REPO_PATH="${REPO_URL#https://github.com/}"
          CLONE_ERR=$(mktemp)
          if ! git clone --depth=1 "https://x-access-token:${GH_TOKEN}@github.com/${REPO_PATH}.git" repo 2>"$CLONE_ERR"; then
            fail "git-clone" "$(cat "$CLONE_ERR")"
          fi
          cd repo
          printf '%s' "$HTML" > index.html
          git config user.email "factory@superplane.local"
          git config user.name "Portfolio Factory"
          git add index.html
          if git diff --cached --quiet; then
            git commit --allow-empty -m "Portfolio Factory: approved redeploy"
          else
            git commit -m "Portfolio Factory: approved, deploying to production"
          fi
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          PUSH_ERR=$(mktemp)
          if ! git push origin "$BRANCH" 2>"$PUSH_ERR"; then
            fail "git-push" "$(cat "$PUSH_ERR")"
          fi
          jq -n --arg repo "$REPO_URL" --arg branch "$BRANCH" '{repo:$repo,branch:$branch}' > "$SUPERPLANE_RESULT_FILE"
      position:
        x: 7680
        'y': 990
      isCollapsed: false
