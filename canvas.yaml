    - id: runnerbash-clean-prompt-a5ddfd
      name: Clean Prompt
      type: TYPE_ACTION
      component: runnerBash
      configuration:
        environment:
          - name: RAW_TEXT
            value: '{{ root().data.text }}'
            valueSource: literal
          - name: USER_ID
            value: '{{ root().data.user }}'
            valueSource: literal
          - name: CHANNEL
            value: '{{ root().data.channel }}'
            valueSource: literal
          - name: SELF_TS
            value: '{{ root().data.ts }}'
            valueSource: literal
          - name: PARENT_TS
            value: '{{ root().data.thread_ts ?? root().data.ts }}'
            valueSource: literal
        execution_mode: host
        execution_timeout_seconds: 60
        machine_type: e1-tiny-amd64
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          CLEAN=$(printf '%s' "$RAW_TEXT" \
            | sed -E 's/<@[A-Z0-9]+>//g' \
            | sed -E 's/<(https?:[^|>]+)\|([^>]+)>/\2/g' \
            | sed -E 's/<(https?:[^>]+)>/\1/g' \
            | sed -E 's/<mailto:[^|>]+\|([^>]+)>/\1/g' \
            | sed -E 's/<mailto:([^>]+)>/\1/g' \
            | tr -s '[:space:]' ' ' \
            | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')
          REPO_OVERRIDE=$(printf '%s' "$CLEAN" \
            | grep -oE 'repo:[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+' \
            | head -1 | sed 's/^repo://' || true)
          if [[ -n "$REPO_OVERRIDE" ]]; then
            CLEAN=$(printf '%s' "$CLEAN" \
              | sed -E 's|repo:[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+||g' \
              | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')
          fi
          # thread_anchor: the conversation key. Use Slack's thread_ts if mention is in a thread, else this message's own ts.
          THREAD_ANCHOR="${PARENT_TS:-$SELF_TS}"
          jq -n \
            --arg clean_text "$CLEAN" \
            --arg user_id "$USER_ID" \
            --arg channel "$CHANNEL" \
            --arg self_ts "$SELF_TS" \
            --arg thread_anchor "$THREAD_ANCHOR" \
            --arg repo_override "${REPO_OVERRIDE:-}" \
            '{clean_text:$clean_text,user_id:$user_id,channel:$channel,self_ts:$self_ts,thread_anchor:$thread_anchor,repo_override:$repo_override}' \
            > "$SUPERPLANE_RESULT_FILE"
      position:
        x: 1280
        'y': 900
      isCollapsed: false
