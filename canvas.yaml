      isCollapsed: false
    - id: build-prompt
      name: Build Prompt
      type: TYPE_ACTION
      component: runnerBash
      configuration:
        environment:
          - name: CONTEXT_JSON
            value: '{{ $[''Load Thread Context''].data.values }}'
            valueSource: literal
          - name: CURRENT_TEXT
            value: '{{ $[''Clean Prompt''].data.result.clean_text }}'
            valueSource: literal
        execution_mode: host
        execution_timeout_seconds: 60
        machine_type: e1-tiny-amd64
        script: |
          #!/usr/bin/env bash
          set -euo pipefail

          # CONTEXT_JSON may be a JSON-stringified array of prior messages, or empty.
          # Each item: {thread_anchor, ts, user_id, prompt}
          # Sort by ts ascending and format as conversation history.
          # The current message is already saved → will appear in CONTEXT_JSON,
          # but we still inject CURRENT_TEXT separately for emphasis.

          HISTORY=""
          if [[ -n "${CONTEXT_JSON// /}" && "$CONTEXT_JSON" != "null" && "$CONTEXT_JSON" != "[]" ]]; then
            HISTORY=$(printf '%s' "$CONTEXT_JSON" | jq -r '
              if type == "array" then
                sort_by(.ts // "")
                | .[]
                | select(.prompt != null and .prompt != "")
                | "- " + .prompt
              else
                empty
              end
            ' 2>/dev/null || true)
          fi

          if [[ -n "$HISTORY" && $(printf '%s\n' "$HISTORY" | wc -l) -gt 1 ]]; then
            PROMPT=$(cat <<EOF
          Slack thread conversation so far (oldest first):
          ${HISTORY}

          The most recent message is:
          ${CURRENT_TEXT}

          Treat the entire conversation above as your brief. If the most recent message is a refinement (e.g. "make it darker", "add a blog section", "use a different name"), apply it on top of the design you would build from the earlier messages. If it stands alone, build accordingly.
          EOF
          )
          else
            PROMPT="$CURRENT_TEXT"
          fi

          jq -n --arg prompt "$PROMPT" '{prompt:$prompt}' > "$SUPERPLANE_RESULT_FILE"
      position:
        x: 3200
        'y': 810
      isCollapsed: false
