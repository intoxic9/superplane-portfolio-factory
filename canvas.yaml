            value: intoxic9/Superplane_hackathon
            valueSource: literal
          - name: USER_ID
            value: '{{ $[''Clean Prompt''].data.result.user_id }}'
            valueSource: literal
          - name: GH_TOKEN
            secret:
              key: GH_TOKEN
              secret: GH_TOKEN
            valueSource: secret
        execution_mode: host
        execution_timeout_seconds: 300
        machine_type: e1-tiny-amd64
        script: |
          #!/usr/bin/env bash
          set -uo pipefail
          REPO_URL=""
          fail() {
            local stage="$1"; shift
            local msg="$*"
            local scrubbed
            scrubbed="$(printf '%s' "$msg" | sed -E 's#x-access-token:[^@]+@#x-access-token:***@#g')"
            jq -n --arg stage "$stage" --arg error "$scrubbed" --arg repo "${REPO_URL:-unknown}" \
              '{error:$error,stage:$stage,repo:$repo}' > "$SUPERPLANE_RESULT_FILE" 2>/dev/null || \
              printf '{"error":"%s","stage":"%s"}' "$scrubbed" "$stage" > "$SUPERPLANE_RESULT_FILE"
            exit 1
          }
          if [[ -n "${REPO_OVERRIDE// /}" ]]; then REPO_INPUT="$REPO_OVERRIDE"; else REPO_INPUT="$DEFAULT_REPO"; fi
          REPO_URL="${REPO_INPUT%.git}"; REPO_URL="${REPO_URL%/}"
          if [[ "$REPO_URL" != https://* ]]; then REPO_URL="https://github.com/${REPO_URL}"; fi
          REPO_PATH="${REPO_URL#https://github.com/}"
          OWNER_REPO="$REPO_PATH"
          PREVIEW_BRANCH="preview/${USER_ID:-default}"
          CLONE_ERR=$(mktemp)
          if ! git clone --depth=1 "https://x-access-token:${GH_TOKEN}@github.com/${REPO_PATH}.git" repo 2>"$CLONE_ERR"; then
            fail "git-clone" "$(cat "$CLONE_ERR")"
          fi
          cd repo
          git checkout -B "$PREVIEW_BRANCH" >/dev/null 2>&1 || true
          printf '%s' "$HTML" > index.html
          git config user.email "factory@superplane.local"
          git config user.name "Portfolio Factory"
          git add index.html
          git commit -m "Portfolio Factory: preview for ${USER_ID}" --allow-empty >/dev/null
          PUSH_ERR=$(mktemp)
          if ! git push origin "$PREVIEW_BRANCH" --force 2>"$PUSH_ERR"; then
            fail "git-push-preview" "$(cat "$PUSH_ERR")"
          fi
          PREVIEW_URL="https://htmlpreview.github.io/?https://github.com/${OWNER_REPO}/blob/${PREVIEW_BRANCH}/index.html"
          jq -n --arg repo "$REPO_URL" --arg branch "$PREVIEW_BRANCH" --arg preview_url "$PREVIEW_URL" \
            '{repo:$repo,branch:$branch,preview_url:$preview_url}' > "$SUPERPLANE_RESULT_FILE"
